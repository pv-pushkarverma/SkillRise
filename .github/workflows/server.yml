name: Server CI

on:
    pull_request:
        branches:
            - main
            - dev
        paths:
            - 'server/**'

jobs:
    check:
        name: Format Check Server
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: server

        steps:
            - uses: actions/checkout@v3

            - name: Use Node.js
              uses: actions/setup-node@v3
              with:
                  node-version: '20'

            - name: Install Dependencies
              run: npm ci

            - name: Check Prettier Formatting
              run: npm run format:check
